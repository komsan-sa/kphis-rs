#===============#
# DB connection #
#===============#
db-url = "mysql://sa:1234@127.0.0.1:3306"
# db-url = "mysql://sa:1234@192.168.0.1:3306"
# db-url = "mysql://sa:1234@host.docker.internal:3306"
db-max-connections = 5
db-acquire-timeout-sec = 10
db-after-connect-sqls = [
    "SET time_zone='+07:00';",
    "SET SESSION group_concat_max_len=65536;"
]

kphis-dbname = "kphis"
kphis-log-dbname = "kphis_log"
kphis-extra-dbname = "kphis_extra"
hosxp-dbname = "hos"
hosxp-hn-length = 7
hosxp-vn-length = 12
hosxp-an-length = 9

#============#
# Web Server #
#============#
http-port = 80
# https-port = 443

http-to-https = false
https-cert-path = "./volume/cert/fullchain.pem"
https-key-path = "./volume/cert/privkey.pem"

# if HTTP request body over this limit(in MB) will return with status 413:Content Too Large
# default is 2, max is 255
request-body-limited-mb = 10

# comment if not use reverse proxy
real-ip-header = "x-real-ip"

# max request qouta that each ip can do, default is 100, max is u32::MAX
rate-limit-burst-size = 100
# increase request qouta by 1 every xx millisecond, not more than max qouta above, default is 100, max is u64::MAX
rate-limit-replenish-every-millisecond = 100

allow-insert-his = true
can-sign-pdf = false
pdf-cert-path = "./volume/cert/pdfcert.pem"
pdf-key-path = "./volume/cert/pkcs8.pem"
pdf-time-stamp-authority-url = "https://freetsa.org/tsr"

# Please comment 'pacs-host' if disabled PACs integration
# pacs-host = "172.18.0.3"
pacs-host-is-kphis-broker = true
pacs-user = "ward"
pacs-password = "1234"
pacs-data-source = "SYNAPSE"

# Cron Job Scheduler for Clearing expired Log and Message / check HTTPS cert file and restart if needed
# UTC time (not your local timezone). Note that the year may be omitted.
# sec   min   hour   day of month   month   day of week   year
# *     *     *      *              *       *             *
app-cron-reload-cert = "0 0 20 * * *"
app-cron-trigger = "0 1 * * * *"
app-cron-cleaner = "0 0 1 * * *"
app-keep-log-day = 90

#===============#
# Compatibility #
#===============#

# php version use space(' ') delimiter to break column and row concatenated string ex. "Foo_Bar Symptom1 Bas Symptom2"
# if it has space(' ') contained words, it will break collection alignment ex. "Foo Bar Symptom 1 Bas Symptom 2"
# so we use cap "^" to break column and use pipe "|" to break row ex. "Foo Bar^Symptom 1|Bas^Symptom 2"
# set concat_with_space = true, system will save to database with space concatenation for old PHP version compatibility
concat-with-space = false

#=========#
# Logging #
#=========#
# level = off | trace | debug | info | warn | error
# crate name that contains hyphens(-) need to replace with underscores(_) ex: "sqlx-mysql" to "sqlx_mysql"
# ex: "debug,hyper=warn,sqlx=info" means
#  'hyper' crate will show 'warn' and 'error',
#  'sqlx' or 'sqlx-xxx' crate will show 'info', 'warn' and 'error',
#  others crate will show 'debug', 'info', 'warn' and 'error'
# read more at https://docs.rs/tracing-subscriber/latest/tracing_subscriber/filter/struct.EnvFilter.html#directives
log-console = "debug,hyper=warn,sqlx=info"
log-file = "debug,hyper=warn,sqlx=info"

#=====#
# App #
#=====#
access-token-expire-minutes = 10
refresh-token-expire-minutes = 600
handshake-2fa-timeout-second = 60
app-asset-cache-minutes = 1440

is-production = false
is-read-only-mode = false
is-access-log-only-authorized = false

is-checked-pharmacist-can-done = true

hospcode = "XXXXX"
code-name = "XXX"
hospital-name = "โรงพยาบาล XXX"
hospital-short-name = "รพ.XXX"
hospital-info = "อำเภอ XXX จังหวัด XXX โทร XXX"
hospital-address = "XXX หมู่ XX ตำบลXXX อำเภอXXX จังหวัดXXX 4XXXX โทร XXX"
drug-notify-use = "N"
drug-notify-start-end-marker-use = "N"
drug-notify-start-marker = "***"
drug-notify-end-marker = "***"

# supported score
# - adult: MEWS, S-NEWS, qSOFA, SIRS
# - child: POPS, PEWS, LqSOFA, pSIRS
# - neonate: NEWS
# find matching age from left to right
score-ews = ["POPS","MEWS"]
score-qsofa = ["LqSOFA","qSOFA"]
score-sirs = ["pSIRS","SIRS"]

# nurse assignment (limit 20 chars for each item)
nurse-assign-groups = ["Incharge","Leader","Member"]

shift-day-start = "08:00:00"
shift-evening-start = "16:00:00"
shift-night-start = "00:00:00"

# IV-fluid and IV-drug from hos.drugitems.dosageform
hosxp-ivfluid-dosageform = "IVFLUIDS"
hosxp-injection-dosageforms = ["INJECTIONS","NEBULIZERS"]

# HAD and LASA from hos.drugitems.displaycolor, base10 number of BGR(hex) ex: BGR(0000FF) is 255
hosxp-had-displaycolor = 255
hosxp-lasa-displaycolor = 16711935

# med-reconcilation icode of "MedRec" from hos.drugitems.icode
hosxp-med-reconcilation-icode = "1640002"

# ID of wbc and band (of CBC) in table hos.lab_items.lab_item_code
hosxp-lab-wbc-code = 5
hosxp-lab-band-code = 20

# list of operation successful id from hos.operation_status.staus_id
hosxp-operation-success = [3]

# roles of Intern in table kphis.system_ac_role_user.role
doctor-intern-roles = ["DOCTOR_INTERN"]

# xray pacs HN's page url ("[HN]" will be replaced with HN)
pacs-hn-url = "http://xxxxxxx/portal/?user_name=xxxxxxx&password=xxxxxxx&close_on_exit=true&patient_id=[HN]"
ekg-hn-url = "http://xxxxxxx/?active=[HN]"
scan-hn-url = "http://xxxxxxx/hosxp.aspx?hn=[HN]&no_ax=true"
scan-an-url = "http://xxxxxxx/?an=[AN]"
cart-vnan-url = "https://xxxxxxx/public/cradle/request?vnan=[VNAN]"
food-url = "http://xxxxxxx/kph_nutrition/"

#========#
# Report #
#========#
# Use another report instead of system report, use default report if target report not defined
report-coercions = [
    { system = 'lab-v0', custom = 'lab-v1' }
]

