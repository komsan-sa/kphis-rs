#===========#
# Lab Alert #
#===========#
# codes =  hos.lab_items.lab_items_code, '@' will be replace with hos.lab_items.lab_order_result
lab-alerts = [
    { description = 'HCT < 30%',                        codes = [4,355],    where = '@ < 30' },
    { description = 'Plt count < 100,000 cell/mm3',     codes = [11],       where = '''REPLACE(@,',','') < 100000''' },
    { description = 'INR > 1.2',                        codes = [241],      where = '@ > 1.2' },
    { description = 'PT > 13 sec',                      codes = [236],      where = '@ > 13' },
    { description = 'Cr > 1.1 mg/dL',                   codes = [78],       where = '@ > 1.1' },
    { description = 'Na < 135 or > 150 mmol/L',         codes = [80],       where = '(@ < 135 OR @ > 150)' },
    { description = 'K < 3.5 or > 5 mmol/L',            codes = [81],       where = '(@ < 3.5 OR @ > 5)' },
    { description = 'HCO3 < 15 mmol/L',                 codes = [82],       where = '@ < 15' },
    { description = 'Albumin < 3.5 g%',                 codes = [95],       where = '@ < 3.5' },
    { description = 'Total Bilirubin > 1.2 mg/dL',      codes = [97],       where = '@ > 1.2' },
    { description = 'AST > 40 U/L',                     codes = [99],       where = '''REPLACE(@,',','') > 40''' },
    { description = 'ALT > 40 U/L',                     codes = [100],      where = '''REPLACE(@,',','') > 40''' },
    { description = 'ALP > 90 U/L',                     codes = [101],      where = '@ > 90' },
    { description = 'Uric acid > 8 mg/dL',              codes = [79],       where = '@ > 8' },
    { description = 'Magnesium < 1.9 mg/dL',            codes = [462],      where = '@ < 1.9' },
    { description = 'Calcium < 8.8 or < 10.6 mg/dL',    codes = [84],       where = '(@ < 8.8 OR @ > 10.6)' },
    { description = 'Phosphorus < 2.5 or > 4.5 mg/dL',  codes = [85],       where = '(@ < 2.5 OR @ > 4.5)' },
    { description = 'Urine WBC > 3 cells/HPF',          codes = [53],       where = '''@ IS NOT NULL AND @ NOT IN ('','-','0-1','1-2','2-3')''' },
    { description = 'Urine RBC > 3 cells/HPF',          codes = [52],       where = '''@ IS NOT NULL AND @ NOT IN ('','-','0-1','1-2','2-3')''' },
]

